---
# 1. THE DEPLOYMENT (Runs your Docker Image)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway-container
        image: healthcare-microservices-api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          valueFrom:
            secretKeyRef:
              name: api-gateway-secrets
              key: PORT
        
        # --- MICROSERVICE INTERNAL URLS ---
        # These tell the Gateway exactly where to find the other pods
        - name: PATIENT_SERVICE_URL
          valueFrom:
            secretKeyRef:
              name: api-gateway-secrets
              key: PATIENT_SERVICE_URL
        - name: DOCTOR_SERVICE_URL
          valueFrom:
            secretKeyRef:
              name: api-gateway-secrets
              key: DOCTOR_SERVICE_URL
        - name: ADMIN_SERVICE_URL
          valueFrom:
            secretKeyRef:
              name: api-gateway-secrets
              key: ADMIN_SERVICE_URL
        - name: PAYMENT_SERVICE_URL
          valueFrom:
            secretKeyRef:
              name: api-gateway-secrets
              key: PAYMENT_SERVICE_URL
        - name: APPOINTMENT_SERVICE_URL
          valueFrom:
            secretKeyRef:
              name: api-gateway-secrets
              key: APPOINTMENT_SERVICE_URL
        - name: NOTIFICATION_SERVICE_URL
          valueFrom:
            secretKeyRef:
              name: api-gateway-secrets
              key: NOTIFICATION_SERVICE_URL

---
# 2. THE SERVICE (Networking)
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
spec:
  type: ClusterIP # Keeps the Gateway secure inside the cluster until Ingress exposes it
  selector:
    app: api-gateway
  ports:
    - port: 5000
      targetPort: 5000
