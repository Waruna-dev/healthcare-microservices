apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-service
  labels:
    app: doctor-service
    service: healthcare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doctor-service
  template:
    metadata:
      labels:
        app: doctor-service
        service: healthcare
    spec:
      containers:
      - name: doctor-service
        image: doctor-service:latest
        ports:
        - containerPort: 5025
        env:
        - name: PORT
          value: "5025"
        - name: MONGODB_URI
          value: "mongodb+srv://admin_db_user:orXvIMG0yRmyMfVc@healthcarecluster.pvbkhea.mongodb.net/doctor_db?appName=HealthcareCluster"
        - name: JWT_SECRET
          value: "care_sync_patient_super_secret_key_2026"
        - name: GEMINI_API_KEY
          value: "AIzaSyCOcwBo0PaCIvuQX0Wt3nRVGr2SLTQcp-A"
        - name: CLOUDINARY_CLOUD_NAME
          value: "dsvrla6zk"
        - name: CLOUDINARY_API_KEY
          value: "172273143945346"
        - name: CLOUDINARY_API_SECRET
          value: "-o7EQ2sk4awv61uDcdBBHyYukMvs"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:5035"
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:5040"
        - name: PATIENT_SERVICE_URL
          value: "http://patient-service:5005"
        - name: APPOINTMENT_SERVICE_URL
          value: "http://appointment-service:5015"
        - name: JITSI_DOMAIN
          value: "meet.jit.si"
        - name: JITSI_ROOM_PREFIX
          value: "care-sync"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5025
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5025
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: doctor-service
  labels:
    app: doctor-service
    service: healthcare
spec:
  selector:
    app: doctor-service
  ports:
  - name: http
    port: 5025
    targetPort: 5025
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: doctor-service-loadbalancer
  labels:
    app: doctor-service
    service: healthcare
spec:
  selector:
    app: doctor-service
  ports:
  - name: http
    port: 5025
    targetPort: 5025
    protocol: TCP
  type: LoadBalancer