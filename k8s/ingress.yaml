apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: caresync-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: nginx
  rules:
  - host: healthcare.local
    http:
      paths:
      - path: /uploads
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 5000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - http:
      paths:
      - path: /uploads
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 5000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
