---
# 1. THE DEPLOYMENT (Manages the Notification Pods)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
      - name: notification-container
        # Make sure this matches the image you build in Step 4!
        image: warunadev/caresync-notification:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 5035  
        env:
        # --- STANDARD ENVIRONMENT VARIABLES (Plain Text) ---
        - name: PORT
          value: "5035"
        - name: FROM_EMAIL
          value: "noreply@caresynclk.me"
        - name: TEXT_LK_SENDER_ID
          value: "careSynclk"
        - name: FRONTEND_URL
          value: "http://localhost"

        # --- SECRETS FETCHED FROM KUBERNETES VAULT ---
        - name: RESEND_API_KEY
          valueFrom:
            secretKeyRef:
              name: notification-secrets
              key: RESEND_API_KEY
        - name: TEXT_LK_API_KEY
          valueFrom:
            secretKeyRef:
              name: notification-secrets
              key: TEXT_LK_API_KEY

---
# 2. THE SERVICE (Handles Networking for Port 5035)
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  type: ClusterIP
  selector:
    app: notification
  ports:
  - protocol: TCP
    port: 5035        
    targetPort: 5035