services:
  patient-service:
    build: ./services/patient-service
    ports:
      - "5005:5005"
    env_file:
      - ./services/patient-service/.env
    restart: unless-stopped

  doctor-service:
    build: ./services/doctor-service
    ports:
      - "5025:5025"
    env_file:
      - ./services/doctor-service/.env
    restart: unless-stopped

  admin-service:
    build: ./services/admin-service
    ports:
      - "5002:5002"
    env_file:
      - ./services/admin-service/.env
    environment:
      PORT: 5002
      PATIENT_SERVICE_URL: http://patient-service:5005
      DOCTOR_SERVICE_URL: http://doctor-service:5025
      NOTIFICATION_SERVICE_URL: http://notification-service:5035
    restart: unless-stopped

  payment-service:
    build: ./services/payment-service
    ports:
      - "5004:5004"
    env_file:
      - ./services/payment-service/.env
    environment:
      PORT: 5004
      APPOINTMENT_SERVICE_URL: http://appointment-service:5015
      NOTIFICATION_SERVICE_URL: http://notification-service:5035
    restart: unless-stopped

  appointment-service:
    build: ./services/appointment-service
    ports:
      - "5015:5015"
    env_file:
      - ./services/appointment-service/.env
    environment:
      PORT: 5015
      PAYMENT_SERVICE_URL: http://payment-service:5004
      TELEMEDICINE_SERVICE_URL: http://telemedicine-service:5018
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    ports:
      - "5035:5035"
    env_file:
      - ./services/notification-service/.env
    restart: unless-stopped

  telemedicine-service:
    build: ./services/telemedicine-service
    ports:
      - "5018:5018"
    env_file:
      - ./services/telemedicine-service/.env
    restart: unless-stopped

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "5000:5000"
    environment:
      PATIENT_SERVICE_URL: http://patient-service:5005
      DOCTOR_SERVICE_URL: http://doctor-service:5025
      ADMIN_SERVICE_URL: http://admin-service:5002
      PAYMENT_SERVICE_URL: http://payment-service:5004
      APPOINTMENT_SERVICE_URL: http://appointment-service:5015
      NOTIFICATION_SERVICE_URL: http://notification-service:5035
    depends_on:
      - patient-service
      - doctor-service
      - admin-service
      - payment-service
      - appointment-service
      - notification-service
      - telemedicine-service
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
